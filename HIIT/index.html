<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05070b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Kettlebell HIIT Selector</title>
<link rel="stylesheet" href="../shared.css" />
<style>
.selector-shell{ max-width:760px; margin:0 auto; }
select{
  width:100%;
  background:var(--bg-elev-2);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  min-height:60px;
}
.output-card{ margin-top:18px; }
</style>
</head>
<body>
<div class="topbar compact">
  <a class="small-btn" href="../menu.html">Back</a>
  <div class="title">Kettlebell HIIT Selector</div>
  <button class="small-btn" data-theme-toggle>Theme</button>
  <button class="small-btn" data-fullscreen-toggle>Full</button>
</div>

<main class="app-screen">
  <div id="selectorView" class="selector-shell">
    <section class="section">
      <h2 class="section-title">Generator</h2>
      <div class="field">
        <div class="label">Movement</div>
        <select id="movement">
          <option value="mixed">Mixed</option>
          <option value="hinge">Hinge</option>
          <option value="squat">Squat</option>
          <option value="combo">Combination</option>
        </select>
      </div>

      <div class="field">
        <div class="label">Load</div>
        <select id="load">
          <option value="single">Single</option>
          <option value="double">Double</option>
          <option value="mixed">Mixed</option>
        </select>
      </div>

      <div class="field">
        <div class="label">Intervals</div>
        <div class="stepper">
          <button class="step-btn" id="countDownBtn">−</button>
          <div class="value-box" id="countBox">6</div>
          <button class="step-btn" id="countUpBtn">+</button>
        </div>
        <input type="hidden" id="count" value="6" />
      </div>

      <div class="control-row">
        <button class="big-btn primary" id="generateBtn">Generate</button>
        <button class="big-btn" id="fullScreenBtn">Full Screen</button>
      </div>

      <div class="section output-card">
        <pre id="output" class="selector-output">Press Generate</pre>
      </div>
    </section>
  </div>

  <div id="fullScreenView" class="full-output-screen">
    <div class="topbar compact">
      <button id="backBtn" class="small-btn">Back</button>
      <div class="title">Full Screen</div>
      <button class="small-btn" data-theme-toggle>Theme</button>
      <button class="small-btn" data-fullscreen-toggle>Full</button>
    </div>
    <pre id="fullScreenOutput"></pre>
    <div class="utility-clock-wrap"><div class="utility-clock" id="fullScreenClock" data-utility-clock>00:00</div></div>
  </div>
</main>

<div class="utility-clock-wrap"><div class="utility-clock" data-utility-clock>00:00</div></div>
<div class="fullscreen-fab"><button class="small-btn fullscreen-btn" data-fullscreen-toggle>⛶</button></div>

<script src="../shared.js"></script>
<script>
registerSharedSetup();

const output = document.getElementById('output');
const full = document.getElementById('fullScreenOutput');
const selector = document.getElementById('selectorView');
const fullscreenView = document.getElementById('fullScreenView');
const countInput = document.getElementById('count');
const countBox = document.getElementById('countBox');
let allExercises = [];

function shuffle(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}
function parseExercises(text) {
  const lines = text.split(/\r?\n/);
  const parsed = [];
  let currentSection = '';
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;
    if (line.startsWith('#')) {
      currentSection = line.replace('#', '').trim().toLowerCase();
      continue;
    }
    const parts = line.split('|').map(part => part.trim());
    if (parts.length < 2 || !currentSection) continue;
    const [load, movement] = currentSection.split('_');
    const name = parts[0];
    const tag = parts[1];
    const isSingleSide = parts[2]?.toLowerCase() === 'single';
    parsed.push({ section: currentSection, load, movement, name, tag, isSingleSide });
  }
  return parsed;
}
function getPool(movement, load) {
  return allExercises.filter(item => {
    const movementOk = movement === 'mixed' ? true : item.movement === movement;
    const loadOk = load === 'mixed' ? true : item.load === load;
    return movementOk && loadOk;
  });
}
function buildIntervals(selectionCount, pool) {
  const available = shuffle(pool);
  const chosen = [];
  let slotsRemaining = selectionCount;

  for (const exercise of available) {
    const slotsNeeded = exercise.isSingleSide ? 2 : 1;
    if (slotsNeeded > slotsRemaining) continue;
    chosen.push(exercise);
    slotsRemaining -= slotsNeeded;
    if (slotsRemaining <= 0) break;
  }

  if (slotsRemaining > 0) {
    const fallback = shuffle(pool);
    for (const exercise of fallback) {
      const slotsNeeded = exercise.isSingleSide ? 2 : 1;
      if (slotsNeeded > slotsRemaining) continue;
      chosen.push(exercise);
      slotsRemaining -= slotsNeeded;
      if (slotsRemaining <= 0) break;
    }
  }

  const lines = [];
  let index = 1;
  chosen.forEach(exercise => {
    if (exercise.isSingleSide) {
      lines.push(`${index}. ${exercise.name} – Right`);
      index += 1;
      lines.push(`${index}. ${exercise.name} – Left`);
      index += 1;
    } else {
      lines.push(`${index}. ${exercise.name}`);
      index += 1;
    }
  });
  return lines;
}
function generateWorkout() {
  const movement = document.getElementById('movement').value;
  const load = document.getElementById('load').value;
  const count = clamp(Number(countInput.value) || 6, 1, 20);
  countInput.value = String(count);
  countBox.textContent = String(count);

  const pool = getPool(movement, load);
  if (!pool.length) {
    output.textContent = 'No matching exercises found.';
    full.textContent = output.textContent;
    return;
  }

  const result = buildIntervals(count, pool);
  if (!result.length) {
    output.textContent = 'Not enough matching exercises to fill the requested intervals.';
    full.textContent = output.textContent;
    return;
  }

  const text = result.join('\n');
  output.textContent = text;
  full.textContent = text;
}
document.getElementById('generateBtn').addEventListener('click', generateWorkout);
document.getElementById('fullScreenBtn').addEventListener('click', () => {
  fullscreenView.classList.add('active');
  full.textContent = output.textContent;
});
document.getElementById('backBtn').addEventListener('click', () => {
  fullscreenView.classList.remove('active');
});
const downBtn = document.getElementById('countDownBtn');
const upBtn = document.getElementById('countUpBtn');

// remove duplicate listeners
const newDown = downBtn.cloneNode(true);
const newUp = upBtn.cloneNode(true);

downBtn.replaceWith(newDown);
upBtn.replaceWith(newUp);

// rebind clean listeners
newDown.addEventListener('click', () => {
  countInput.value = String(clamp(Number(countInput.value) - 1, 1, 20));
  countBox.textContent = countInput.value;
});

newUp.addEventListener('click', () => {
  countInput.value = String(clamp(Number(countInput.value) + 1, 1, 20));
  countBox.textContent = countInput.value;
});

fetch('exercises.txt').then(res => res.text()).then(text => {
  allExercises = parseExercises(text);
  generateWorkout();
}).catch(() => {
  output.textContent = 'Failed to load exercises.txt';
  full.textContent = output.textContent;
});
</script>
</body>
</html>
