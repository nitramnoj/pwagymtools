<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05070b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Gym Tools" />
<title>Gym Tools</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="shared.css" />
<style>
  body{overflow:hidden;}
  .clock-home{
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:calc(var(--safe-top) + 24px) 24px calc(var(--safe-bottom) + 24px);
    text-align:center;
  }
  .home-top-actions{
    position:fixed;
    top:var(--safe-top);
    right:var(--safe-right);
    display:flex;
    gap:12px;
    z-index:50;
  }
  .home-time{
    font-size:clamp(100px,26vw,280px);
    line-height:.88;
    font-weight:800;
    letter-spacing:-.06em;
  }
  .home-date{
    margin-top:14px;
    font-size:clamp(32px,6.5vw,74px);
    line-height:1.08;
    color:var(--muted);
    font-weight:600;
  }
  .home-hint{
    position:fixed;
    left:50%;
    bottom:calc(var(--safe-bottom) + 18px);
    transform:translateX(-50%);
    color:var(--muted);
    font-size:clamp(16px,1.9vw,20px);
    text-align:center;
    width:min(90vw,680px);
  }
</style>
</head>
<body data-idle-root="true">
<div class="home-top-actions">
  <button class="small-btn" onclick="window.location.href='menu.html'">Menu</button>
  <button class="small-btn" data-theme-toggle>Theme</button>
  <button class="small-btn" data-fullscreen-toggle>Full</button>
</div>

<main class="clock-home" aria-label="Clock home screen">
  <div class="home-time" data-home-time>00:00</div>
  <div class="home-date" data-home-date>Mon 27 Mar</div>
</main>

<div class="home-hint"></div>

<script src="shared.js"></script>
<script>
registerSharedSetup();
</script>
</body>
</html>
