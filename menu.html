<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05070b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Gym Tools Menu</title>
<link rel="stylesheet" href="shared.css" />
</head>
<body>
<div class="topbar compact">
  <button class="small-btn" onclick="window.location.href='index.html'">Back</button>
  <div class="title">Gym Tools</div>
  <button class="small-btn" data-theme-toggle>Theme</button>
  <button class="small-btn" data-fullscreen-toggle>Full</button>
</div>

<main class="app-screen">
  <div class="page-wrap">
    <section class="section">
      <h2 class="section-title">Tools</h2>
      <p class="hint">Buttons are loaded from tools.json</p>
      <div id="tools" class="button-list"></div>
    </section>

    <section class="section">
      <h2 class="section-title">Split Screen</h2>
      <p class="hint">Buttons are loaded from combos.json</p>
      <div id="combos" class="button-list"></div>
    </section>
  </div>
</main>

<div class="utility-clock-wrap"><div class="utility-clock" data-utility-clock>00:00</div></div>
<div class="fullscreen-fab"><button class="small-btn fullscreen-btn" data-fullscreen-toggle>⛶</button></div>

<script src="shared.js"></script>
<script>
registerSharedSetup();

function createButton(label, url) {
  const btn = document.createElement('button');
  btn.className = 'tool-btn';
  btn.textContent = label;
  btn.onclick = () => { window.location.href = url; };
  return btn;
}
function showStatus(containerId, message) {
  const el = document.getElementById(containerId);
  const status = document.createElement('div');
  status.className = 'hint';
  status.textContent = message;
  el.appendChild(status);
}
fetch('tools.json').then(r => r.json()).then(data => {
  const container = document.getElementById('tools');
  data.forEach(item => container.appendChild(createButton(item.label, item.url)));
}).catch(() => showStatus('tools', 'Failed to load tools.json'));

fetch('combos.json').then(r => r.json()).then(data => {
  const container = document.getElementById('combos');
  data.forEach(item => {
    const url = `split.html?left=${encodeURIComponent(item.left)}&right=${encodeURIComponent(item.right)}`;
    container.appendChild(createButton(item.label, url));
  });
}).catch(() => showStatus('combos', 'Failed to load combos.json'));
</script>
</body>
</html>
