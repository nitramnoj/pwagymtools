<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05070b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Split Screen</title>
<link rel="stylesheet" href="shared.css" />
</head>
<body>
<div class="topbar compact">
  <button class="small-btn" onclick="window.location.href='menu.html'">Back</button>
  <div class="title">Split Screen</div>
  <button class="small-btn" data-theme-toggle>Theme</button>
  <button class="small-btn" data-fullscreen-toggle>Full</button>
</div>

<main class="app-screen">
  <div id="frames" class="frame-wrap">
    <iframe id="leftFrame" title="Left panel" allow="fullscreen"></iframe>
    <iframe id="rightFrame" title="Right panel" allow="fullscreen"></iframe>
  </div>
  <div id="error" class="error-box" hidden></div>
</main>

<script src="shared.js"></script>
<script>
registerSharedSetup();
function getParam(name) {
  return new URL(window.location.href).searchParams.get(name);
}
function normaliseUrl(value) {
  if (!value) return '';
  try { return decodeURIComponent(value).trim(); } catch { return String(value).trim(); }
}
function isAllowedTarget(value) {
  if (!value) return false;
  if (/^[a-zA-Z0-9._\/-]+(\.html)?$/i.test(value) && !value.includes('..')) return true;
  return false;
}
const left = normaliseUrl(getParam('left'));
const right = normaliseUrl(getParam('right'));
if (isAllowedTarget(left) && isAllowedTarget(right)) {
  document.getElementById('leftFrame').src = left;
  document.getElementById('rightFrame').src = right;
} else {
  document.getElementById('frames').style.display = 'none';
  const error = document.getElementById('error');
  error.hidden = false;
  error.textContent = 'Invalid split-screen URLs.';
}
</script>
</body>
</html>
